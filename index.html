<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Моё портфолио</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        header {
            background: #111827;
            padding: 30px;
            text-align: center;
        }

        h1 {
            margin: 0;
            color: #38bdf8;
        }

        p {
            color: #cbd5e1;
        }

        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin-top: 20px;
            border-radius: 12px;
        }

        button {
            margin-top: 10px;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: #38bdf8;
            color: black;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0ea5e9;
        }

<body>

<header>
    <h1>Султан</h1>

</header>

<div class="container">

    <div class="card">
        <h2>Обо мне</h2>
        <p>Я учусь создавать сайты и хочу стать программистом.</p>
    </div>

    <div class="card">
        <h2>Мои навыки</h2>
        <p>HTML, немного CSS, и я только начинаю JavaScript.</p>
    </div>

    <div class="card">
        <h2>Проект</h2>
        <p>Мой первый сайт-портфолио</p>

        <button onclick="alert('Это твой первый проект!')">
            Нажми меня

</div>
